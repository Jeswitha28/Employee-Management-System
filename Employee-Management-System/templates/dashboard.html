<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <h2>Welcome, {{ session['username'] }} ({{ role }})</h2>

    <h3>Navigation</h3>
    <div class="nav-links">
        <a href="/employees">View Employees</a>
        <a href="/export/excel">Export to Excel</a>
        <a href="/export/pdf">Export to PDF</a>
        <a href="{{ url_for('salary_chart') }}">View Salary Chart</a>
        <a href="/attendance">Mark Attendance</a>
        <a href="/attendance/view">View Attendance Logs</a>
    </div>

    {% if chart %}
        <h3>Salary Chart</h3>
        <img src="{{ url_for('static', filename=chart) }}" alt="Chart">
    {% endif %}
</body>
</html>
